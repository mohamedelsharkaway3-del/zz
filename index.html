<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مصنع المروج | النظام الذكي</title>
  <style>
    /* الإعدادات الأساسية (نفس التصميم الـ 3D السابق مع تحسينات) */
    :root {
      --primary: #103625; --gold: #d4af37; --bg: #f4f8f4;
      --shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: #333; }
    .container { width: min(1200px, 94vw); margin: auto; }
    
    /* الهيدر */
    .nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px 0; position: sticky; top:0; z-index:100; border-bottom: 2px solid var(--primary); }
    
    /* كارت المنتج التشخيصي */
    .diag-card {
        background: white; border-radius: 30px; padding: 40px; box-shadow: var(--shadow);
        display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin: 40px 0;
    }
    .product-img-box img { width: 100%; border-radius: 20px; transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    
    /* أزرار الاختيارات */
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 30px; }
    .opt-btn { 
        padding: 15px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; 
        font-weight: bold; background: white; transition: 0.3s;
    }
    .opt-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

    .btn-main { 
        background: var(--gold); color: var(--primary); padding: 15px 30px; border-radius: 50px; 
        text-decoration: none; font-weight: 900; display: inline-block; transition: 0.3s; border: none; cursor: pointer;
    }
    .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212,175,55,0.4); }
    
    .btn-outline {
        border: 2px solid var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 50px;
        text-decoration: none; font-weight: bold; margin-right: 10px;
    }

    @media (max-width: 768px) { .diag-card { grid-template-columns: 1fr; } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; color:var(--primary);">المروج 🌿</h2>
        <div>
            <a href="https://your-other-webapp-link.vercel.app" class="btn-outline">تصفحي المتجر الكامل 🛒</a>
            <a href="#order" class="btn-main">سلة المشتريات</a>
        </div>
    </div>
</nav>

<section class="container" style="padding: 50px 0;">
    <h1 style="text-align:center; font-size:2.5rem;">التشخيص الذكي لشعرك</h1>
    <p style="text-align:center; color:#666;">اختاري مشكلتك وسنقوم بتجهيز التركيبة فوراً</p>

    <div class="diag-card" id="quiz-section">
        <div class="product-info-box">
            <div class="options-grid" id="optionsGrid">
                <button class="opt-btn active" data-id="tasaqot">تساقط</button>
                <button class="opt-btn" data-id="enbat">فراغات</button>
                <button class="opt-btn" data-id="dry">جفاف</button>
                <button class="opt-btn" data-id="damage">تقصف</button>
            </div>
            
            <h2 id="p-title" style="font-size:2rem; margin-bottom:10px;">كورس مكافحة التساقط</h2>
            <p id="p-desc" style="color:#555; font-size:1.1rem; line-height:1.8;">هذا المنتج يحتوي على خلاصة الروزماري والزيوت الطبيعية التي تعمل على تقوية البصيلة من الجذور وحتى الأطراف.</p>
            
            <div style="margin: 20px 0;">
                <span id="p-price" style="font-size:1.8rem; font-weight:900; color:var(--primary);">250 ج.م</span>
                <span style="text-decoration:line-through; color:#999; margin-right:15px;">350 ج.م</span>
            </div>

            <button class="btn-main" style="width:100%; font-size:1.2rem;" onclick="addToCart()">أضيفي للطلب الآن +</button>
        </div>

        <div class="product-img-box">
            <img id="p-img" src="https://via.placeholder.com/500x500?text=Anti-Hairfall+Product" alt="المنتج">
        </div>
    </div>
</section>

<section id="order" class="container" style="background:white; border-radius:30px; padding:40px; margin-bottom:50px;">
    <h2>سلتك الحالية 🛍️</h2>
    <div id="cartList" style="margin-bottom:20px;">
        </div>
    <div style="border-top:2px solid #eee; padding-top:20px; font-size:1.5rem; font-weight:900;">
        الإجمالي: <span id="totalPrice">0</span> ج.م
    </div>
</section>

<script>
    // داتا المنتجات التفصيلية
    const PRODUCTS_DATA = {
        tasaqot: {
            title: "كورس مكافحة التساقط الملكي",
            desc: "تركيبة غنية بالبيوتين والكافيين الطبيعي لوقف التساقط في 14 يوم فقط. تعمل على تمديد دورة حياة الشعرة وتنشيط الدورة الدموية.",
            price: 250,
            image: "https://via.placeholder.com/500x500?text=Tasaqot+Oil" // ضع رابط صورتك هنا
        },
        enbat: {
            title: "مجموعة الإنبات المكثف",
            desc: "تحتوي على جزيئات النانو لفتح مسام فروة الرأس وتحفيز البصيلات الخاملة لإعادة إنبات الشعر في أماكن الفراغات.",
            price: 280,
            image: "https://via.placeholder.com/500x500?text=Hair+Regrowth" // ضع رابط صورتك هنا
        },
        dry: {
            title: "حمام كريم هيدرا-ماكس",
            desc: "ترطيب عميق يصل لأعماق الشعرة. مثالي للشعر المصبوغ أو المجهد من الحرارة. يعيد اللمعان والنعومة فوراً.",
            price: 190,
            image: "https://via.placeholder.com/500x500?text=Hydration+Mask" // ضع رابط صورتك هنا
        },
        damage: {
            title: "سيروم إصلاح الروابط",
            desc: "تقنية متطورة لإعادة بناء روابط الشعر المكسورة نتيجة الصبغة والفرد الكيميائي. ينهي مشكلة التقصف تماماً.",
            price: 220,
            image: "https://via.placeholder.com/500x500?text=Repair+Serum" // ضع رابط صورتك هنا
        }
    };

    let currentId = 'tasaqot';
    let cart = [];

    // التبديل بين المنتجات بناء على الضغط
    document.querySelectorAll('.opt-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentId = btn.dataset.id;
            updateUI();
        };
    });

    function updateUI() {
        const data = PRODUCTS_DATA[currentId];
        document.getElementById('p-title').innerText = data.title;
        document.getElementById('p-desc').innerText = data.desc;
        document.getElementById('p-price').innerText = data.price + " ج.م";
        document.getElementById('p-img').src = data.image;
        
        // تأثير انيميشن خفيف للصورة عند التغيير
        document.getElementById('p-img').style.opacity = 0;
        setTimeout(() => { document.getElementById('p-img').style.opacity = 1; }, 100);
    }

    function addToCart() {
        cart.push(PRODUCTS_DATA[currentId]);
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map((item, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <span>${item.title}</span>
                <span>${item.price} ج.م</span>
            </div>
        `).join('');
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('totalPrice').innerText = total;
    }
</script>

</body>
</html>
