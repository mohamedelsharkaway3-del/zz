<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مصنع المروج | شعرك في أمان لسنين قدام</title>
  <style>
    :root {
      --primary-dark: #103625;
      --primary-light: #2a6f4f;
      --accent-gold: #d4af37;
      --accent-gold-hover: #b38f00;
      --bg-light: #f4f8f4;
      --text-dark: #2d3436;
      --white: #ffffff;
      --shadow-3d: 0 25px 50px rgba(0,0,0,0.15), 0 10px 20px rgba(0,0,0,0.1);
      --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { box-sizing: border-box; scroll-behavior: smooth; outline: none; }
    
    body {
      margin: 0; font-family: 'Cairo', sans-serif;
      background: var(--bg-light); color: var(--text-dark);
      overflow-x: hidden; background-attachment: fixed;
      background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    }

    .container { width: min(1300px, 94vw); margin: auto; padding: 0 20px; }

    .topbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
      border-bottom: 2px solid var(--primary-dark); padding: 15px 0;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .nav-buttons { display: flex; gap: 10px; align-items: center; }
    
    .btn-outline-shop {
        border: 2px solid var(--primary-dark); color: var(--primary-dark);
        padding: 8px 15px; border-radius: 50px; text-decoration: none;
        font-weight: bold; transition: 0.3s; font-size: 0.85rem;
    }

    .btn-price-list {
        background: #eef5f2; color: var(--primary-light);
        border: 1px dashed var(--primary-light);
        padding: 8px 15px; border-radius: 50px; text-decoration: none;
        font-weight: bold; transition: 0.3s; font-size: 0.85rem;
    }

    .wa-float-container { position: fixed; left: 30px; bottom: 30px; z-index: 999; }
    .btn-wa { background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5); }

    /* 3D Interactive Card */
    #quiz { padding: 40px 0; perspective: 2000px; }
    .quiz-card-3d {
      background: rgba(255,255,255,0.9); border-radius: 40px; padding: 40px;
      transform-style: preserve-3d; transition: transform 0.2s ease-out;
      box-shadow: var(--shadow-3d); border: 1px solid rgba(255,255,255,0.5);
      position: relative;
    }

    .quiz-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 25px; }
    .option-btn {
      padding: 12px; border-radius: 15px; border: 2px solid #e0e0e0; background: #fff;
      cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.9rem;
    }
    .option-btn.active { background: var(--primary-dark); color: white; border-color: var(--primary-dark); transform: translateZ(20px); }

    .recommendation-inner {
        margin-top: 30px; display: flex; gap: 30px; align-items: center; flex-wrap:wrap;
        background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        transform: translateZ(30px);
    }

    .btn-premium {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-hover));
      color: #103625; border: none; padding: 15px 30px; border-radius: 50px;
      font-size: 1.1rem; font-weight: 900; cursor: pointer; transition: 0.4s;
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); text-decoration: none; display: inline-block;
    }

    /* Offers Tag */
    .offer-badge {
      background: #e74c3c; color: white; padding: 5px 15px; border-radius: 50px;
      font-size: 0.8rem; position: absolute; top: -10px; right: 20px; animation: bounce 2s infinite;
    }
    @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-5px);} }

    .order-grid { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 30px; margin: 40px 0; }
    .final-order-card, .summary-sidebar { background: white; border-radius: 30px; padding: 30px; box-shadow: var(--shadow-3d); }
    .summary-sidebar { background: var(--primary-dark); color: white; position: sticky; top: 100px; }

    .discount-line { color: #2ecc71; font-size: 0.9rem; display: none; margin-bottom: 5px; }
    
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }
    .blogger-code { border: 2px dashed var(--accent-gold); background: #fffcf0; }

    @media (max-width: 1000px) { .order-grid { grid-template-columns: 1fr; } .summary-sidebar { position: static; } }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="color:var(--primary-dark); margin:0; font-size:1.3rem;">المروج 🌿</h1>
        <div class="nav-buttons">
            <a href="https://almorouglist1.netlify.app/" target="_blank" class="btn-price-list">الأسعار 📄</a>
            <a href="#order" class="btn-premium" style="padding:8px 18px; font-size:0.8rem;">السلة</a>
        </div>
    </div>
  </div>

  <section id="quiz" class="container">
    <div class="quiz-card-3d" id="main-quiz-card">
      <div class="offer-badge">🔥 عروض اليوم: 2+1 مجاناً أو خصم 50% على القطعة الثانية</div>
      <h2 style="text-align:center; color:var(--primary-dark); margin-top:0;">تشخيص المروج التفاعلي 🔬</h2>
      
      <div class="quiz-options" id="problemOptions">
        <button class="option-btn active" data-id="tasaqot">تساقط</button>
        <button class="option-btn" data-id="enbat">إنبات</button>
        <button class="option-btn" data-id="taktheef">تكثيف</button>
        <button class="option-btn" data-id="repair">ترميم</button>
        <button class="option-btn" data-id="hydrate">ترطيب</button>
      </div>
      
      <div class="recommendation-inner" id="recommendation-box">
        <div style="flex:1.5; min-width:250px;">
            <h3 id="rec-title" style="color:var(--primary-dark); margin:10px 0;">علاج التساقط</h3>
            <p id="rec-desc" style="color:#666; font-size:0.9rem; margin-bottom:15px;">التركيبة الأقوى لتقليل التساقط ودعم الفروة.</p>
            <div style="margin-bottom:15px;">
                <span id="rec-price" style="font-size:1.6rem; font-weight:900; color:var(--primary-dark);">199 ج.م</span>
            </div>
            <button class="btn-premium" onclick="addToCartFromQuiz()" style="width:100%;">أضيفي للسلة +</button>
        </div>
        <div style="flex:1; text-align:center;">
            <img id="rec-img" src="https://via.placeholder.com/200" style="width:100%; border-radius:15px;" alt="المنتج">
        </div>
      </div>
    </div>
  </section>

  <section id="order" class="container order-grid">
    <div class="final-order-card">
      <h2 style="color:var(--primary-dark); margin-top:0;">بيانات التوصيل 🚚</h2>
      <input type="text" id="cust-name" placeholder="الاسم بالكامل">
      <input type="tel" id="cust-phone" placeholder="رقم الموبايل">
      
      <select id="cust-gov" onchange="renderCart()">
        <option value="" disabled selected>اختر المحافظة...</option>
        <optgroup label="القاهرة والكبرى">
            <option value="48">القاهرة</option>
            <option value="48">الجيزة</option>
            <option value="48">القليوبية</option>
        </optgroup>
        <optgroup label="الإسكندرية">
            <option value="55">الإسكندرية</option>
        </optgroup>
        <optgroup label="الدلتا ووجه بحري">
            <option value="65">الشرقية</option>
            <option value="65">الغربية</option>
            <option value="65">الدقهلية</option>
            <option value="65">البحيرة</option>
            <option value="65">المنوفية</option>
            <option value="65">كفر الشيخ</option>
            <option value="65">دمياط</option>
        </optgroup>
        <optgroup label="مدن القناة">
            <option value="65">بورسعيد</option>
            <option value="65">الإسماعيلية</option>
            <option value="65">السويس</option>
        </optgroup>
        <optgroup label="صعيد مصر">
            <option value="65">الفيوم</option>
            <option value="65">بني سويف</option>
            <option value="65">المنيا</option>
            <option value="65">أسيوط</option>
            <option value="65">سوهاج</option>
            <option value="65">قنا</option>
            <option value="65">الأقصر</option>
            <option value="65">أسوان</option>
        </optgroup>
        <optgroup label="المحافظات الحدودية">
            <option value="65">مطروح</option>
            <option value="65">البحر الأحمر</option>
            <option value="65">الوادي الجديد</option>
            <option value="65">شمال سيناء</option>
            <option value="65">جنوب سيناء</option>
        </optgroup>
      </select>

      <input type="text" id="blogger-code" class="blogger-code" placeholder="كود الخصم (للبلوجرز فقط) ✨" oninput="renderCart()">
      <textarea id="cust-address" placeholder="العنوان بالتفصيل" rows="2"></textarea>
      <button class="btn-premium" style="width:100%; padding:18px; background:var(--primary-dark); color:white;" onclick="sendToWhatsApp()">تأكيد الطلب | واتساب</button>
    </div>

    <div class="summary-sidebar">
      <h3>ملخص الطلب 🛍️</h3>
      <div id="cart-items-list" style="min-height:50px;"></div>
      <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
        <div id="offer-text" class="discount-line" style="display:block;"></div>
        <div id="blogger-discount-line" class="discount-line"></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>الشحن:</span><span id="shipping-cost">0 ج.م</span></div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.3rem; color:var(--accent-gold);"><span>الإجمالي:</span><span id="final-total">0 ج.م</span></div>
      </div>
    </div>
  </section>

  <script>
    const PRODUCTS = {
      tasaqot: { title: "علاج التساقط", price: 199, desc: "تقليل التساقط ودعم الفروة." },
      enbat: { title: "إنبات الشعر", price: 169, desc: "للمناطق الخفيفة والفراغات." },
      taktheef: { title: "تكثيف الشعر", price: 179, desc: "دعم الكثافة وتحسين الشكل." },
      repair: { title: "ترميم الشعر", price: 159, desc: "للشعر المتقصف والتالف." },
      hydrate: { title: "ترطيب الشعر", price: 139, desc: "للشعر الجاف والهايش." }
    };

    let cart = {};
    let currentRec = "tasaqot";

    const card = document.getElementById('main-quiz-card');
    document.addEventListener('mousemove', (e) => {
      if(window.innerWidth < 768) return;
      let x = (window.innerWidth / 2 - e.pageX) / 25;
      let y = (window.innerHeight / 2 - e.pageY) / 25;
      card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });

    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        let x = e.gamma / 2; 
        let y = (e.beta - 40) / 2;
        card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
      });
    }

    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRec = btn.dataset.id;
            updateUI();
        };
    });

    function updateUI() {
        const p = PRODUCTS[currentRec];
        document.getElementById('rec-title').innerText = p.title;
        document.getElementById('rec-desc').innerText = p.desc;
        document.getElementById('rec-price').innerText = p.price + " ج.م";
    }

    function addToCartFromQuiz() {
        cart[currentRec] = (cart[currentRec] || 0) + 1;
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cart-items-list');
        list.innerHTML = '';
        let subtotal = 0;
        let totalQty = 0;
        let prices = [];

        Object.keys(cart).forEach(id => {
            const p = PRODUCTS[id];
            for(let i=0; i<cart[id]; i++) {
                prices.push(p.price);
                totalQty++;
            }
            subtotal += p.price * cart[id];
            list.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:5px;"><span>${p.title} x${cart[id]}</span><span>${p.price * cart[id]} ج.م</span></div>`;
        });

        let discount = 0;
        let offerMsg = "";
        prices.sort((a,b) => a-b);

        if (totalQty === 2) {
            discount = prices[0] * 0.5;
            offerMsg = "✅ خصم 50% على القطعة الثانية";
        } else if (totalQty >= 3) {
            discount = prices[0];
            offerMsg = "✅ عرض 2+1: قطعة مجانية";
        }

        let bloggerCode = document.getElementById('blogger-code').value.toUpperCase();
        let bloggerDiscount = 0;
        if(bloggerCode === "MROUG10" || bloggerCode === "ALMOROUG") {
            bloggerDiscount = (subtotal - discount) * 0.10;
            document.getElementById('blogger-discount-line').style.display = "block";
            document.getElementById('blogger-discount-line').innerText = `✨ خصم بلوجر: -${bloggerDiscount.toFixed(0)} ج.م`;
        } else {
            document.getElementById('blogger-discount-line').style.display = "none";
        }

        let shipping = parseInt(document.getElementById('cust-gov').value) || 0;
        if ((subtotal - discount - bloggerDiscount) >= 500) {
            shipping = 0;
            offerMsg = "🎁 شحن مجاني + هدية المروج";
        }

        document.getElementById('offer-text').innerText = offerMsg;
        document.getElementById('shipping-cost').innerText = shipping === 0 ? "مجاني" : shipping + " ج.م";
        
        let finalTotal = subtotal - discount - bloggerDiscount + shipping;
        document.getElementById('final-total').innerText = Math.max(0, finalTotal).toFixed(0) + " ج.م";
    }

    function sendToWhatsApp() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = document.getElementById('cust-address').value;
        const govSelect = document.getElementById('cust-gov');
        const gov = govSelect.options[govSelect.selectedIndex]?.text || "لم يتم التحديد";
        const final = document.getElementById('final-total').innerText;
        
        if(!name || !phone || !govSelect.value) return alert("يرجى إكمال البيانات واختيار المحافظة");
        
        let productLines = "";
        Object.keys(cart).forEach(id => productLines += `- ${PRODUCTS[id].title} (x${cart[id]})\n`);
        
        let msg = `طلب جديد من المروج 🌿\nالاسم: ${name}\nالهاتف: ${phone}\nالمحافظة: ${gov}\nالعنوان: ${address}\n\nالمنتجات:\n${productLines}\nالعرض: ${document.getElementById('offer-text').innerText}\nالإجمالي: ${final}`;
        window.open(`https://wa.me/201090988359?text=${encodeURIComponent(msg)}`);
    }
  </script>
</body>
</html>
